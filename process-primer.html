<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MF Process Primer — GDB Logistics</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #ffffff;
  --bg2: #f7f6f2;
  --bg3: #f0efe9;
  --border: rgba(0,0,0,0.1);
  --border2: rgba(0,0,0,0.18);
  --text: #1a1a18;
  --text2: #5f5e5a;
  --text3: #8b8a85;
  --purple: #534AB7; --purple-l: #EEEDFE; --purple-d: #26215C;
  --teal: #0F6E56;   --teal-l: #E1F5EE;   --teal-d: #04342C;
  --amber: #854F0B;  --amber-l: #FAEEDA;  --amber-d: #412402;
  --blue: #185FA5;   --blue-l: #E6F1FB;   --blue-d: #042C53;
  --red: #A32D2D;    --red-l: #FCEBEB;
  --green-l: #EAF3DE; --green-d: #27500A;
}

@media (prefers-color-scheme: dark) {
  :root {
    --bg: #14140f;
    --bg2: #1c1c16;
    --bg3: #232319;
    --border: rgba(255,255,255,0.08);
    --border2: rgba(255,255,255,0.14);
    --text: #e8e6de;
    --text2: #9c9a92;
    --text3: #5f5e5a;
    --purple-l: #26215C; --purple-d: #CECBF6;
    --teal-l: #04342C;   --teal-d: #9FE1CB;
    --amber-l: #412402;  --amber-d: #FAC775;
    --blue-l: #042C53;   --blue-d: #B5D4F4;
    --red-l: #501313;
    --green-l: #173404; --green-d: #C0DD97;
  }
}

body {
  font-family: -apple-system, "Segoe UI", sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  padding: 2rem 1rem;
}

.container {
  max-width: 1100px;
  margin: 0 auto;
}

.header {
  margin-bottom: 2rem;
  padding-bottom: 1rem;
  border-bottom: 0.5px solid var(--border);
}

.header-eyebrow {
  font-size: 11px;
  font-weight: 600;
  letter-spacing: .08em;
  text-transform: uppercase;
  color: var(--text3);
  margin-bottom: 6px;
}

.header-title {
  font-size: 22px;
  font-weight: 500;
  color: var(--text);
}

.header-sub {
  font-size: 14px;
  color: var(--text2);
  margin-top: 4px;
}

.step-dots {
  display: flex;
  gap: 6px;
  justify-content: center;
  margin-bottom: 1.5rem;
  flex-wrap: wrap;
}

.dot {
  width: 8px;
  height: 8px;
  border-radius: 50%;
  background: var(--border2);
  cursor: pointer;
  transition: all .2s;
  border: none;
  padding: 0;
}

.dot.active { background: var(--text); transform: scale(1.25); }
.dot.done   { background: var(--text3); }

.panel {
  background: var(--bg);
  border: 0.5px solid var(--border2);
  border-radius: 12px;
  overflow: hidden;
}

.panel-head {
  padding: 18px 22px 16px;
  border-bottom: 0.5px solid var(--border);
}

.step-label {
  font-size: 11px;
  font-weight: 600;
  letter-spacing: .06em;
  color: var(--text3);
  text-transform: uppercase;
  margin-bottom: 6px;
}

.panel-title { font-size: 18px; font-weight: 500; margin-bottom: 5px; }
.panel-sub   { font-size: 13px; color: var(--text2); line-height: 1.6; }

.panel-body { padding: 20px 22px; }

.nav-row {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-top: 1.25rem;
  gap: 8px;
}

.nav-btn {
  font-size: 13px;
  padding: 8px 18px;
  border-radius: 8px;
  border: 0.5px solid var(--border2);
  background: var(--bg);
  color: var(--text);
  cursor: pointer;
  transition: all .15s;
  font-family: inherit;
}

.nav-btn:hover:not(:disabled) { background: var(--bg2); }
.nav-btn:disabled { opacity: .3; cursor: not-allowed; }

.nav-btn.primary {
  background: var(--text);
  color: var(--bg);
  border-color: var(--text);
}

.nav-btn.primary:hover { opacity: .85; }

.step-count { font-size: 13px; color: var(--text3); }

/* ── Dashboard mock ── */
.dash-mock {
  background: #0d1117;
  border-radius: 8px;
  padding: 14px 16px;
  margin-bottom: 14px;
}

.dash-stats {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 8px;
  margin-bottom: 12px;
}

.stat-card { background: #161b22; border-radius: 6px; padding: 8px 10px; }
.stat-label { font-size: 10px; color: #8b949e; margin-bottom: 3px; }
.stat-num   { font-size: 18px; font-weight: 600; color: #e6edf3; }
.stat-sub   { font-size: 10px; color: #8b949e; margin-top: 1px; }

.dash-filter {
  display: flex;
  gap: 6px;
  flex-wrap: wrap;
  margin-bottom: 10px;
}

.filter-pill {
  font-size: 11px;
  padding: 3px 10px;
  border-radius: 12px;
  border: 0.5px solid #30363d;
  color: #8b949e;
}

.filter-pill.active  { background: #1f3a5f; border-color: #388bfd; color: #79b8ff; }
.filter-pill.error   { background: #3a1a1a; border-color: #f85149; color: #ff7b72; }
.filter-pill.success { background: #1a3a1a; border-color: #3fb950; color: #56d364; }

.dash-divider { font-size: 10px; color: #8b949e; padding: 0 0 8px; }

.dash-row {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 6px 0;
  border-bottom: 0.5px solid #21262d;
  font-size: 11px;
  color: #c9d1d9;
}

.dash-row:last-child { border-bottom: none; }

.status-bar { width: 6px; height: 40px; border-radius: 2px; flex-shrink: 0; }
.status-red    { background: #f85149; }
.status-yellow { background: #d29922; }
.status-green  { background: #3fb950; }

.task-name { min-width: 150px; font-weight: 500; }
.task-route { color: #8b949e; flex: 1; }
.task-tag {
  font-size: 10px;
  padding: 1px 6px;
  border-radius: 8px;
  background: #21262d;
  color: #8b949e;
  white-space: nowrap;
}

/* ── Concept cards ── */
.concept-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
  gap: 10px;
  margin-bottom: 14px;
}

.concept-card {
  border-radius: 8px;
  padding: 12px 14px;
  border: 0.5px solid;
}

.cc-purple { background: var(--purple-l); border-color: #AFA9EC; }
.cc-purple .cc-title { color: var(--purple-d); }
.cc-purple .cc-sub   { color: var(--purple); }
.cc-purple .cc-tag   { background: #CECBF6; color: var(--purple-d); }
.cc-purple .task-pill { background: rgba(83,74,183,.12); color: var(--purple-d); }

.cc-teal { background: var(--teal-l); border-color: #5DCAA5; }
.cc-teal .cc-title { color: var(--teal-d); }
.cc-teal .cc-sub   { color: var(--teal); }
.cc-teal .cc-tag   { background: #9FE1CB; color: var(--teal-d); }
.cc-teal .task-pill { background: rgba(15,110,86,.12); color: var(--teal-d); }

.cc-amber { background: var(--amber-l); border-color: #EF9F27; }
.cc-amber .cc-title { color: var(--amber-d); }
.cc-amber .cc-sub   { color: var(--amber); }
.cc-amber .cc-tag   { background: #FAC775; color: var(--amber-d); }
.cc-amber .task-pill { background: rgba(133,79,11,.12); color: var(--amber-d); }

.cc-blue { background: var(--blue-l); border-color: #85B7EB; }
.cc-blue .cc-title { color: var(--blue-d); }
.cc-blue .cc-sub   { color: var(--blue); }
.cc-blue .cc-tag   { background: #B5D4F4; color: var(--blue-d); }
.cc-blue .task-pill { background: rgba(24,95,165,.12); color: var(--blue-d); }

.cc-gray { background: var(--bg2); border-color: var(--border2); }
.cc-gray .cc-title { color: var(--text); }
.cc-gray .cc-sub   { color: var(--text2); }
.cc-gray .task-pill { background: var(--bg3); color: var(--text2); }

.cc-coral { background: #FAECE7; border-color: #F0997B; }
.cc-coral .cc-title { color: #4A1B0C; }
.cc-coral .cc-sub   { color: #993C1D; }
.cc-coral .cc-tag   { background: #F5C4B3; color: #4A1B0C; }
.cc-coral .task-pill { background: rgba(153,60,29,.12); color: #4A1B0C; }

@media (prefers-color-scheme: dark) {
  .cc-purple .cc-tag   { background: #3C3489; color: #CECBF6; }
  .cc-purple .task-pill { background: rgba(83,74,183,.2); color: #CECBF6; }
  .cc-teal .cc-tag     { background: #085041; color: #9FE1CB; }
  .cc-teal .task-pill  { background: rgba(15,110,86,.2); color: #9FE1CB; }
  .cc-blue .cc-tag     { background: #0C447C; color: #B5D4F4; }
  .cc-blue .task-pill  { background: rgba(24,95,165,.2); color: #B5D4F4; }
  .cc-amber .cc-tag    { background: #633806; color: #FAC775; }
  .cc-amber .task-pill { background: rgba(133,79,11,.2); color: #FAC775; }
  .cc-coral { background: #4A1B0C; border-color: #993C1D; }
  .cc-coral .cc-title  { color: #F5C4B3; }
  .cc-coral .cc-sub    { color: #F0997B; }
  .cc-coral .cc-tag    { background: #712B13; color: #F5C4B3; }
  .cc-coral .task-pill { background: rgba(240,153,123,.12); color: #F5C4B3; }
}

.cc-title { font-size: 13px; font-weight: 500; margin-bottom: 3px; }
.cc-sub   { font-size: 12px; line-height: 1.5; margin-bottom: 6px; }
.cc-tag   { font-size: 10px; font-weight: 600; padding: 2px 7px; border-radius: 8px; display: inline-block; }

.cc-tasks { margin-top: 8px; padding-top: 8px; border-top: 0.5px solid rgba(0,0,0,.08); }

.task-pill {
  font-size: 10px;
  display: inline-block;
  padding: 2px 6px;
  border-radius: 6px;
  margin: 2px 2px 0 0;
}

/* ── Highlight box ── */
.highlight-box {
  border-radius: 8px;
  padding: 12px 14px;
  border: 0.5px solid var(--border2);
  background: var(--bg2);
  margin-bottom: 14px;
  font-size: 13px;
  line-height: 1.6;
  color: var(--text2);
}

.highlight-box strong { color: var(--text); font-weight: 500; }

/* ── Two-col status grid ── */
.two-col { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 14px; }
.status-label { font-size: 11px; font-weight: 600; color: var(--text3); text-transform: uppercase; letter-spacing: .04em; margin-bottom: 8px; }
.status-desc  { font-size: 12px; color: var(--text2); margin-top: 8px; line-height: 1.5; }

/* ── Model shift ── */
.model-label { font-size: 11px; font-weight: 600; color: var(--text3); text-transform: uppercase; letter-spacing: .04em; margin-bottom: 8px; margin-top: 14px; }
.team-grid   { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; margin-bottom: 14px; }

@media (max-width: 600px) {
  .dash-stats  { grid-template-columns: repeat(2, 1fr); }
  .concept-grid { grid-template-columns: 1fr 1fr; }
  .two-col     { grid-template-columns: 1fr; }
  .team-grid   { grid-template-columns: 1fr 1fr; }
}
</style>
</head>
<body>
<div class="container">

  <div class="header">
    <div class="header-eyebrow">GDB Logistics · MyFreight</div>
    <div class="header-title">Process primer</div>
    <div class="header-sub">How operational work is organised and managed in MyFreight</div>
  </div>

  <div class="step-dots" id="dots"></div>
  <div class="panel" id="panel"></div>

</div>

<script>
const steps = [
  {
    label: "Step 1 of 6",
    title: "The dashboard is where work starts",
    sub: "Every morning, an Ops user opens the MF dashboard. It shows exactly what needs attention — overdue tasks, pending tasks, and arrivals — before a single shipment is opened.",
    render() {
      return `
        <div class="dash-mock">
          <div class="dash-stats">
            <div class="stat-card"><div class="stat-label">Tasks overdue</div><div class="stat-num" style="color:#f85149">6498</div><div class="stat-sub">Total</div></div>
            <div class="stat-card"><div class="stat-label">Tasks pending</div><div class="stat-num">135</div><div class="stat-sub">Total</div></div>
            <div class="stat-card"><div class="stat-label">Customer requests</div><div class="stat-num">862</div><div class="stat-sub">Bookings</div></div>
            <div class="stat-card"><div class="stat-label">Arrivals</div><div class="stat-num">314</div><div class="stat-sub">This week</div></div>
          </div>
          <div class="dash-divider">Tasks list — all shipments requiring action</div>
          ${[
            ['Delivery','Shanghai → Paris','Raffin Medical','red'],
            ['Customs document(s) received','Haiphong → Le Havre','Sacherie de Pantin','red'],
            ['Dev Message Log','Ningbo → Rotterdam','Direct Sales B.V.','yellow'],
          ].map(([name,route,cust,col])=>`
          <div class="dash-row">
            <div class="status-bar status-${col}"></div>
            <div class="task-name">${name}</div>
            <div class="task-route">${route} · ${cust}</div>
          </div>`).join('')}
        </div>
        <div class="highlight-box"><strong>Key idea:</strong> The dashboard is not a shipment list. It is a task list. Every row is a shipment that has an open task requiring Ops action right now.</div>`;
    }
  },
  {
    label: "Step 2 of 6",
    title: "Tasks are grouped into teams",
    sub: "The first filter on the dashboard is the Team. In MF, every task belongs to a team — but we are not using teams to represent people. We are using them as task type buckets.",
    render() {
      return `
        <div class="dash-mock">
          <div class="dash-filter">
            <div class="filter-pill active">Ocean import</div>
            <div class="filter-pill">Assignee</div>
            <div class="filter-pill">Task type · All</div>
            <div class="filter-pill">Origin</div>
            <div class="filter-pill">Destination</div>
          </div>
          <div class="dash-divider">Selecting a team pre-filters the task list to that category of work</div>
          ${[
            ['Delivery','Shanghai → Paris'],
            ['Delivery','Hong Kong → Paris'],
            ['Customs doc. received','Haiphong → Le Havre'],
          ].map(([name,route])=>`
          <div class="dash-row">
            <div class="status-bar status-red"></div>
            <div class="task-name">${name}</div>
            <div class="task-route">${route}</div>
          </div>`).join('')}
        </div>
        <div class="highlight-box"><strong>The shift in thinking:</strong> Instead of an Ops user owning a portfolio of individual shipments, they select their team filter and work through every shipment that has an open task in that category — regardless of who "owns" the shipment.</div>`;
    }
  },
  {
    label: "Step 3 of 6",
    title: "Five teams cover all operational work",
    sub: "Each team maps to a distinct phase of the Ocean Import process. Tasks defined in STG-1 through STG-8 each belong to exactly one team.",
    render() {
      return `
        <div class="concept-grid">
          <div class="concept-card cc-purple">
            <div class="cc-title">Import booking</div>
            <div class="cc-sub">Booking intake and data completion</div>
            <span class="cc-tag">STG-1 · STG-2</span>
            <div class="cc-tasks">
              <span class="task-pill">Validate booking</span>
              <span class="task-pill">Check agent update</span>
              <span class="task-pill">Complete shipment data</span>
              <span class="task-pill">Booking confirmation</span>
            </div>
          </div>
          <div class="concept-card cc-teal">
            <div class="cc-title">Import documentation</div>
            <div class="cc-sub">Document verification, customs, carrier release</div>
            <span class="cc-tag">STG-3 · STG-4 · STG-6</span>
            <div class="cc-tasks">
              <span class="task-pill">Document verification</span>
              <span class="task-pill">Customs submission</span>
              <span class="task-pill">Carrier release</span>
            </div>
          </div>
          <div class="concept-card cc-blue">
            <div class="cc-title">Import operations</div>
            <div class="cc-sub">Arrival monitoring and delivery planning</div>
            <span class="cc-tag">STG-5 · STG-7</span>
            <div class="cc-tasks">
              <span class="task-pill">Arrival monitoring</span>
              <span class="task-pill">Delivery planning</span>
              <span class="task-pill">Empty container return</span>
            </div>
          </div>
          <div class="concept-card cc-coral">
            <div class="cc-title">Financial handling</div>
            <div class="cc-sub">Accruals, invoice verification, shipment closure</div>
            <span class="cc-tag">STG-8</span>
            <div class="cc-tasks">
              <span class="task-pill">Record accrual</span>
              <span class="task-pill">Invoice verification</span>
              <span class="task-pill">Close shipment</span>
            </div>
          </div>
          <div class="concept-card cc-amber">
            <div class="cc-title">Error handling</div>
            <div class="cc-sub">Integration alerts and rejected messages</div>
            <span class="cc-tag">Persistent</span>
            <div class="cc-tasks">
              <span class="task-pill">Dev message log</span>
              <span class="task-pill">Customs rejection</span>
            </div>
          </div>
        </div>`;
    }
  },
  {
    label: "Step 4 of 6",
    title: "The Dev Message Log: always present, usually quiet",
    sub: "Every shipment carries a Dev Message Log task. Most of the time it is silent. When the integration layer flags something, its status changes — and it becomes visible in the dashboard.",
    render() {
      return `
        <div class="two-col">
          <div>
            <div class="status-label">Normal state — completed</div>
            <div class="dash-mock" style="padding:10px 12px">
              <div class="dash-row">
                <div class="status-bar status-green"></div>
                <div>
                  <div style="font-size:11px;font-weight:600;color:#3fb950">Dev Message Log</div>
                  <div style="font-size:10px;color:#8b949e;margin-top:2px">Ningbo → Rotterdam</div>
                  <div style="font-size:10px;color:#8b949e">Completed · no action needed</div>
                </div>
              </div>
            </div>
            <div class="status-desc">Green / completed. Contains only informational log entries. Not visible in the To-do task list.</div>
          </div>
          <div>
            <div class="status-label">Alert state — pending</div>
            <div class="dash-mock" style="padding:10px 12px">
              <div class="dash-row">
                <div class="status-bar status-yellow"></div>
                <div>
                  <div style="font-size:11px;font-weight:600;color:#d29922">Dev Message Log</div>
                  <div style="font-size:10px;color:#8b949e;margin-top:2px">Ningbo → Rotterdam</div>
                  <div style="font-size:10px;color:#d29922">Pending · requires attention</div>
                </div>
              </div>
            </div>
            <div class="status-desc">Yellow / pending. An error or missing data log entry has been detected. Appears in the Error Handling team filter.</div>
          </div>
        </div>
        <div class="highlight-box"><strong>Status drives visibility:</strong> The task exists on every shipment, but only surfaces in the dashboard when it requires action. Ops can proactively scan for integration issues without searching individual shipments.</div>`;
    }
  },
  {
    label: "Step 5 of 6",
    title: "Error handling: a dedicated triage layer",
    sub: "The Error Handling team is not a phase in the process — it runs in parallel. Any Ops user can open this filter and immediately see every shipment with an active integration problem.",
    render() {
      return `
        <div class="dash-mock" style="margin-bottom:14px">
          <div class="dash-filter">
            <div class="filter-pill error">Error handling</div>
            <div class="filter-pill">Assignee</div>
            <div class="filter-pill">Task type · All</div>
          </div>
          <div class="dash-divider">Only shipments with active errors surface here</div>
          <div class="dash-row">
            <div class="status-bar status-yellow"></div>
            <div class="task-name" style="color:#d29922">Dev Message Log</div>
            <div class="task-route">Missing ETD from agent update</div>
            <div class="task-tag" style="color:#d29922;background:#2a2000">Pending</div>
          </div>
          <div class="dash-row">
            <div class="status-bar status-yellow"></div>
            <div class="task-name" style="color:#d29922">Dev Message Log</div>
            <div class="task-route">SnapLogic pipeline error · no container nr</div>
            <div class="task-tag" style="color:#d29922;background:#2a2000">Pending</div>
          </div>
          <div class="dash-row">
            <div class="status-bar status-red"></div>
            <div class="task-name" style="color:#f85149">Customs rejection</div>
            <div class="task-route">HS code validation failure · Maco</div>
            <div class="task-tag" style="color:#f85149;background:#2a0000">Overdue</div>
          </div>
        </div>
        <div class="concept-grid" style="grid-template-columns:1fr 1fr">
          <div class="concept-card cc-amber">
            <div class="cc-title">Dev Message Log (pending)</div>
            <div class="cc-sub">Integration log entry requires Ops action — missing data, pipeline error, or agent update issue</div>
          </div>
          <div class="concept-card" style="background:var(--red-l);border-color:#F09595">
            <div class="cc-title" style="color:#501313">Customs rejection</div>
            <div class="cc-sub" style="color:#A32D2D">Customs message rejected by Maco or external API — validation failure or system error</div>
          </div>
        </div>
        <div class="highlight-box"><strong>Why this matters:</strong> Without this team, integration errors are invisible until someone opens the shipment. With it, any Ops user can be first responder — the error handling workload is shared, not siloed.</div>`;
    }
  },
  {
    label: "Step 6 of 6",
    title: "From individual ownership to collective scanning",
    sub: "This is the core operating model shift. The team structure in MF is what makes it possible.",
    render() {
      return `
        <div class="model-label" style="margin-top:0">Old model</div>
        <div class="concept-card cc-gray" style="margin-bottom:14px">
          <div class="cc-title">Freight forwarder owns a shipment portfolio</div>
          <div class="cc-sub">Each person is responsible for a set of shipments end-to-end. They check their own shipments for updates. Issues on someone else's shipment are not their concern. Absence = nothing gets done.</div>
        </div>
        <div class="model-label">New model</div>
        <div class="concept-card cc-teal" style="margin-bottom:14px">
          <div class="cc-title">Ops users scan task queues by type</div>
          <div class="cc-sub">A user opens "Import Booking" and works through every shipment with a booking task — regardless of who handles that shipment otherwise. The task queue is shared. Any qualified person can pick up the next item.</div>
        </div>
        <div class="team-grid" style="grid-template-columns:repeat(5,1fr)">
          ${[
            {t:'Import booking',       c:'cc-purple', d:'Scan daily for new bookings and agent updates'},
            {t:'Import documentation', c:'cc-teal',   d:'Work through pending document and customs tasks'},
            {t:'Import operations',    c:'cc-blue',   d:'Monitor arrivals and manage delivery planning'},
            {t:'Financial handling',   c:'cc-coral',  d:'Record accruals, verify invoices, close shipments'},
            {t:'Error handling',       c:'cc-amber',  d:'Proactive triage of integration and customs errors'},
          ].map(i=>`<div class="concept-card ${i.c}"><div class="cc-title">${i.t}</div><div class="cc-sub" style="font-size:11px">${i.d}</div></div>`).join('')}
        </div>
        <div class="highlight-box"><strong>What this requires:</strong> Every task in STG-1 through STG-8 must be assigned to exactly one team. That mapping is agreed during the workshop.</div>`;
    }
  }
];

let cur = 0;

function renderDots() {
  document.getElementById('dots').innerHTML = steps.map((s, i) =>
    `<button class="dot ${i === cur ? 'active' : i < cur ? 'done' : ''}" onclick="goTo(${i})" aria-label="Step ${i+1}"></button>`
  ).join('');
}

function renderPanel() {
  const s = steps[cur];
  document.getElementById('panel').innerHTML = `
    <div class="panel-head">
      <div class="step-label">${s.label}</div>
      <div class="panel-title">${s.title}</div>
      <div class="panel-sub">${s.sub}</div>
    </div>
    <div class="panel-body">
      ${s.render()}
      <div class="nav-row">
        <button class="nav-btn" onclick="goTo(${cur - 1})" ${cur === 0 ? 'disabled' : ''}>← Back</button>
        <span class="step-count">${cur + 1} / ${steps.length}</span>
        ${cur < steps.length - 1
          ? `<button class="nav-btn primary" onclick="goTo(${cur + 1})">Next →</button>`
          : `<button class="nav-btn primary" disabled>Complete</button>`}
      </div>
    </div>`;
}

function goTo(i) {
  if (i < 0 || i >= steps.length) return;
  cur = i;
  renderDots();
  renderPanel();
}

renderDots();
renderPanel();
</script>
</body>
</html>
