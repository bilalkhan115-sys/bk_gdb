<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MF Process Primer — GDB Logistics</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #ffffff;
  --bg2: #f7f6f2;
  --bg3: #f0efe9;
  --border: rgba(0,0,0,0.1);
  --border2: rgba(0,0,0,0.18);
  --text: #1a1a18;
  --text2: #5f5e5a;
  --text3: #8b8a85;
  --purple: #534AB7; --purple-l: #EEEDFE; --purple-d: #26215C;
  --teal: #0F6E56;   --teal-l: #E1F5EE;   --teal-d: #04342C;
  --amber: #854F0B;  --amber-l: #FAEEDA;  --amber-d: #412402;
  --blue: #185FA5;   --blue-l: #E6F1FB;   --blue-d: #042C53;
  --red: #A32D2D;    --red-l: #FCEBEB;
  --green-l: #EAF3DE; --green-d: #27500A;
}

.dark {
  --bg: #14140f;
  --bg2: #1c1c16;
  --bg3: #232319;
  --border: rgba(255,255,255,0.08);
  --border2: rgba(255,255,255,0.14);
  --text: #e8e6de;
  --text2: #9c9a92;
  --text3: #5f5e5a;
  --purple-l: #26215C; --purple-d: #CECBF6;
  --teal-l: #04342C;   --teal-d: #9FE1CB;
  --amber-l: #412402;  --amber-d: #FAC775;
  --blue-l: #042C53;   --blue-d: #B5D4F4;
  --red-l: #501313;
  --green-l: #173404; --green-d: #C0DD97;
}

.dark .cc-purple .cc-tag   { background: #3C3489; color: #CECBF6; }
.dark .cc-purple .task-pill { background: rgba(83,74,183,.2); color: #CECBF6; }
.dark .cc-teal .cc-tag     { background: #085041; color: #9FE1CB; }
.dark .cc-teal .task-pill  { background: rgba(15,110,86,.2); color: #9FE1CB; }
.dark .cc-blue .cc-tag     { background: #0C447C; color: #B5D4F4; }
.dark .cc-blue .task-pill  { background: rgba(24,95,165,.2); color: #B5D4F4; }
.dark .cc-amber .cc-tag    { background: #633806; color: #FAC775; }
.dark .cc-amber .task-pill { background: rgba(133,79,11,.2); color: #FAC775; }
.dark .cc-coral { background: #4A1B0C; border-color: #993C1D; }
.dark .cc-coral .cc-title  { color: #F5C4B3; }
.dark .cc-coral .cc-sub    { color: #F0997B; }
.dark .cc-coral .cc-tag    { background: #712B13; color: #F5C4B3; }
.dark .cc-coral .task-pill { background: rgba(240,153,123,.12); color: #F5C4B3; }

body {
  font-family: -apple-system, "Segoe UI", sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  padding: 2rem 1rem;
}

.container {
  max-width: 1100px;
  margin: 0 auto;
}

.header {
  margin-bottom: 2rem;
  padding-bottom: 1rem;
  border-bottom: 0.5px solid var(--border);
}

.header-eyebrow {
  font-size: 11px;
  font-weight: 600;
  letter-spacing: .08em;
  text-transform: uppercase;
  color: var(--text3);
  margin-bottom: 6px;
}

.header-title {
  font-size: 22px;
  font-weight: 500;
  color: var(--text);
}

.header-sub {
  font-size: 14px;
  color: var(--text2);
  margin-top: 4px;
}

.step-dots {
  display: flex;
  gap: 6px;
  justify-content: center;
  margin-bottom: 1.5rem;
  flex-wrap: wrap;
}

.dot {
  width: 8px;
  height: 8px;
  border-radius: 50%;
  background: var(--border2);
  cursor: pointer;
  transition: all .2s;
  border: none;
  padding: 0;
}

.dot.active { background: var(--text); transform: scale(1.25); }
.dot.done   { background: var(--text3); }

.panel {
  background: var(--bg);
  border: 0.5px solid var(--border2);
  border-radius: 12px;
  overflow: hidden;
}

.panel-head {
  padding: 18px 22px 16px;
  border-bottom: 0.5px solid var(--border);
}

.step-label {
  font-size: 11px;
  font-weight: 600;
  letter-spacing: .06em;
  color: var(--text3);
  text-transform: uppercase;
  margin-bottom: 6px;
}

.panel-title { font-size: 18px; font-weight: 500; margin-bottom: 5px; }
.panel-sub   { font-size: 13px; color: var(--text2); line-height: 1.6; }

.panel-body { padding: 20px 22px; }

.nav-row {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-top: 1.25rem;
  gap: 8px;
}

.nav-btn {
  font-size: 13px;
  padding: 8px 18px;
  border-radius: 8px;
  border: 0.5px solid var(--border2);
  background: var(--bg);
  color: var(--text);
  cursor: pointer;
  transition: all .15s;
  font-family: inherit;
}

.nav-btn:hover:not(:disabled) { background: var(--bg2); }
.nav-btn:disabled { opacity: .3; cursor: not-allowed; }

.nav-btn.primary {
  background: var(--text);
  color: var(--bg);
  border-color: var(--text);
}

.nav-btn.primary:hover { opacity: .85; }

.step-count { font-size: 13px; color: var(--text3); }

/* ── Dashboard mock ── */
.dash-mock {
  background: #0d1117;
  border-radius: 8px;
  padding: 14px 16px;
  margin-bottom: 14px;
}

.dash-stats {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 8px;
  margin-bottom: 12px;
}

.stat-card { background: #161b22; border-radius: 6px; padding: 8px 10px; }
.stat-label { font-size: 10px; color: #8b949e; margin-bottom: 3px; }
.stat-num   { font-size: 18px; font-weight: 600; color: #e6edf3; }
.stat-sub   { font-size: 10px; color: #8b949e; margin-top: 1px; }

.dash-filter {
  display: flex;
  gap: 6px;
  flex-wrap: wrap;
  margin-bottom: 10px;
}

.filter-pill {
  font-size: 11px;
  padding: 3px 10px;
  border-radius: 12px;
  border: 0.5px solid #30363d;
  color: #8b949e;
}

.filter-pill.active  { background: #1f3a5f; border-color: #388bfd; color: #79b8ff; }
.filter-pill.error   { background: #3a1a1a; border-color: #f85149; color: #ff7b72; }
.filter-pill.success { background: #1a3a1a; border-color: #3fb950; color: #56d364; }

.dash-divider { font-size: 10px; color: #8b949e; padding: 0 0 8px; }

.dash-row {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 6px 0;
  border-bottom: 0.5px solid #21262d;
  font-size: 11px;
  color: #c9d1d9;
}

.dash-row:last-child { border-bottom: none; }

.status-bar { width: 6px; height: 40px; border-radius: 2px; flex-shrink: 0; }
.status-red    { background: #f85149; }
.status-yellow { background: #d29922; }
.status-green  { background: #3fb950; }

.task-name { min-width: 150px; font-weight: 500; }
.task-route { color: #8b949e; flex: 1; }
.task-tag {
  font-size: 10px;
  padding: 1px 6px;
  border-radius: 8px;
  background: #21262d;
  color: #8b949e;
  white-space: nowrap;
}

/* ── Concept cards ── */
.concept-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
  gap: 10px;
  margin-bottom: 14px;
}

.concept-card {
  border-radius: 8px;
  padding: 12px 14px;
  border: 0.5px solid;
}

.cc-purple { background: var(--purple-l); border-color: #AFA9EC; }
.cc-purple .cc-title { color: var(--purple-d); }
.cc-purple .cc-sub   { color: var(--purple); }
.cc-purple .cc-tag   { background: #CECBF6; color: var(--purple-d); }
.cc-purple .task-pill { background: rgba(83,74,183,.12); color: var(--purple-d); }

.cc-teal { background: var(--teal-l); border-color: #5DCAA5; }
.cc-teal .cc-title { color: var(--teal-d); }
.cc-teal .cc-sub   { color: var(--teal); }
.cc-teal .cc-tag   { background: #9FE1CB; color: var(--teal-d); }
.cc-teal .task-pill { background: rgba(15,110,86,.12); color: var(--teal-d); }

.cc-amber { background: var(--amber-l); border-color: #EF9F27; }
.cc-amber .cc-title { color: var(--amber-d); }
.cc-amber .cc-sub   { color: var(--amber); }
.cc-amber .cc-tag   { background: #FAC775; color: var(--amber-d); }
.cc-amber .task-pill { background: rgba(133,79,11,.12); color: var(--amber-d); }

.cc-blue { background: var(--blue-l); border-color: #85B7EB; }
.cc-blue .cc-title { color: var(--blue-d); }
.cc-blue .cc-sub   { color: var(--blue); }
.cc-blue .cc-tag   { background: #B5D4F4; color: var(--blue-d); }
.cc-blue .task-pill { background: rgba(24,95,165,.12); color: var(--blue-d); }

.cc-gray { background: var(--bg2); border-color: var(--border2); }
.cc-gray .cc-title { color: var(--text); }
.cc-gray .cc-sub   { color: var(--text2); }
.cc-gray .task-pill { background: var(--bg3); color: var(--text2); }

.cc-coral { background: #FAECE7; border-color: #F0997B; }
.cc-coral .cc-title { color: #4A1B0C; }
.cc-coral .cc-sub   { color: #993C1D; }
.cc-coral .cc-tag   { background: #F5C4B3; color: #4A1B0C; }
.cc-coral .task-pill { background: rgba(153,60,29,.12); color: #4A1B0C; }


.cc-title { font-size: 13px; font-weight: 500; margin-bottom: 3px; }
.cc-sub   { font-size: 12px; line-height: 1.5; margin-bottom: 6px; }
.cc-tag   { font-size: 10px; font-weight: 600; padding: 2px 7px; border-radius: 8px; display: inline-block; }

.cc-tasks { margin-top: 8px; padding-top: 8px; border-top: 0.5px solid rgba(0,0,0,.08); }

.task-pill {
  font-size: 10px;
  display: inline-block;
  padding: 2px 6px;
  border-radius: 6px;
  margin: 2px 2px 0 0;
}

/* ── Highlight box ── */
.highlight-box {
  border-radius: 8px;
  padding: 12px 14px;
  border: 0.5px solid var(--border2);
  background: var(--bg2);
  margin-bottom: 14px;
  font-size: 13px;
  line-height: 1.6;
  color: var(--text2);
}

.highlight-box strong { color: var(--text); font-weight: 500; }

/* ── Two-col status grid ── */
.two-col { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 14px; }
.status-label { font-size: 11px; font-weight: 600; color: var(--text3); text-transform: uppercase; letter-spacing: .04em; margin-bottom: 8px; }
.status-desc  { font-size: 12px; color: var(--text2); margin-top: 8px; line-height: 1.5; }

/* ── Model shift ── */
.model-label { font-size: 11px; font-weight: 600; color: var(--text3); text-transform: uppercase; letter-spacing: .04em; margin-bottom: 8px; margin-top: 14px; }
.team-grid   { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; margin-bottom: 14px; }

.theme-toggle {
  display: flex;
  align-items: center;
  gap: 8px;
  font-size: 12px;
  color: var(--text3);
  cursor: pointer;
  background: none;
  border: 0.5px solid var(--border2);
  border-radius: 20px;
  padding: 4px 12px;
  font-family: inherit;
  transition: all .15s;
  margin-top: 12px;
}
.theme-toggle:hover { background: var(--bg2); }
.theme-toggle-icon { font-size: 14px; }
@media (max-width: 600px) {
  .dash-stats  { grid-template-columns: repeat(2, 1fr); }
  .concept-grid { grid-template-columns: 1fr 1fr; }
  .two-col     { grid-template-columns: 1fr; }
  .team-grid   { grid-template-columns: 1fr 1fr; }
}
.logo-banner {
  display: flex;
  align-items: center;
  gap: 12px;
  margin-bottom: 10px;
}

:root .logo-banner {
  background: #2a2a24;
  padding: 10px 1rem;
  margin-left: calc(-1rem);
  margin-right: calc(-1rem);
  margin-top: calc(-2rem);
  margin-bottom: 10px;
}

.dark .logo-banner {
  background: transparent;
  padding: 0;
  margin-left: 0;
  margin-right: 0;
  margin-top: 0;
  margin-bottom: 10px;
}
</style>
</head>
<body>
<div class="container">

  <div class="header">
    <div class="logo-banner">
      <img
        src="https://gdblogistics.com/wp-content/uploads/2025/11/Logo-GDB-landscape.svg"
        alt="GDB Logistics"
        style="height:28px;width:auto;flex-shrink:0;opacity:0.9;"
        onerror="this.style.display='none'"
      />
      <span style="font-size:11px;font-weight:600;color:var(--border2)"> | </span>
      <img
        src="https://www.myfreight.nl/lovable-uploads/a749a5ed-16c1-4ba1-bb2a-64de76854145.png"
        alt="MyFreight"
        style="height:20px;width:auto;flex-shrink:0;opacity:0.9;"
        onerror="this.style.display='none'"
      />
    </div>
    <div class="header-title">Process primer</div>
    <div class="header-sub">How operational work is organised and managed in MyFreight</div>
  </div>

  <button class="theme-toggle" id="themeToggle" onclick="toggleTheme()">
    <span class="theme-toggle-icon" id="themeIcon">☀️</span>
    <span id="themeLabel">Light mode</span>
  </button>
  <div style="margin-top:1.5rem"></div>
  <div class="step-dots" id="dots"></div>
  <div class="panel" id="panel"></div>

</div>

<script>
// ── Theme ──
function applyTheme(dark) {
  document.documentElement.classList.toggle('dark', dark);
  document.getElementById('themeIcon').textContent  = dark ? '🌙' : '☀️';
  document.getElementById('themeLabel').textContent = dark ? 'Dark mode' : 'Light mode';
  localStorage.setItem('gdb-theme', dark ? 'dark' : 'light');
}

function toggleTheme() {
  applyTheme(!document.documentElement.classList.contains('dark'));
}

(function initTheme() {
  const saved = localStorage.getItem('gdb-theme');
  const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
  applyTheme(saved ? saved === 'dark' : prefersDark);
})();
const steps = [
  {
    label: "Step 1 of 6",
    title: "The dashboard is where work starts",
    sub: "Every morning, the user opens the MyFreight dashboard. It shows exactly what needs attention - overdue tasks, pending tasks, and arrivals - before a single shipment is opened.",
    render() {
      return `
        <div class="dash-mock">
          <div class="dash-stats">
            <div class="stat-card"><div class="stat-label">Tasks overdue</div><div class="stat-num" style="color:#f85149">6498</div><div class="stat-sub">Total</div></div>
            <div class="stat-card"><div class="stat-label">Tasks pending</div><div class="stat-num">135</div><div class="stat-sub">Total</div></div>
            <div class="stat-card"><div class="stat-label">Customer requests</div><div class="stat-num">862</div><div class="stat-sub">Bookings</div></div>
            <div class="stat-card"><div class="stat-label">Arrivals</div><div class="stat-num">314</div><div class="stat-sub">This week</div></div>
          </div>
          <div class="dash-divider">Tasks list — all shipments requiring action</div>
          ${[
            ['Delivery','Shanghai → Paris','Raffin Medical','red'],
            ['Customs document(s) received','Haiphong → Le Havre','Sacherie de Pantin','red'],
            ['Dev Message Log','Ningbo → Rotterdam','Direct Sales B.V.','yellow'],
          ].map(([name,route,cust,col])=>`
          <div class="dash-row">
            <div class="status-bar status-${col}"></div>
            <div class="task-name">${name}</div>
            <div class="task-route">${route} · ${cust}</div>
          </div>`).join('')}
        </div>
        <div class="highlight-box"><strong>Key idea:</strong> The dashboard is not a shipment list. It is a task list. Every row is a shipment that has an open task requiring Ops action right now.</div>`;
    }
  },
  {
    label: "Step 2 of 6",
    title: "Tasks are grouped into teams",
    sub: "The first filter on the dashboard is the Team. In MF, every task belongs to a team — but we are not using teams to represent people. We are using them as task type buckets.",
    render() {
      return `
        <div class="dash-mock">
          <div class="dash-filter">
            <div class="filter-pill active">Ocean import</div>
            <div class="filter-pill">Assignee</div>
            <div class="filter-pill">Task type · All</div>
            <div class="filter-pill">Origin</div>
            <div class="filter-pill">Destination</div>
          </div>
          <div class="dash-divider">Selecting a team pre-filters the task list to that category of work</div>
          ${[
            ['Delivery','Shanghai → Paris'],
            ['Delivery','Hong Kong → Paris'],
            ['Customs doc. received','Haiphong → Le Havre'],
          ].map(([name,route])=>`
          <div class="dash-row">
            <div class="status-bar status-red"></div>
            <div class="task-name">${name}</div>
            <div class="task-route">${route}</div>
          </div>`).join('')}
        </div>
        <div class="highlight-box"><strong>The shift in thinking:</strong> Instead of the user owning a portfolio of individual shipments, they select their team filter and work through every shipment that has an open task in that category — regardless of who "owns" the shipment.</div>`;
    }
  },
{
    title: "Shipment data completeness is a shared standard",
    sub: "MF is the source of truth for every shipment — for downstream systems, customer-facing outputs, and financial processing. Empty fields break integrations and delay other teams. Completeness is a baseline expectation, not a best effort.",
    render() {
      const sections = [
        {
          label: 'Origin & lane',
          cls: 'cc-purple',
          dotColor: '#534AB7',
          fields: [
            { name: 'POL', req: true }, { name: 'POD', req: true },
            { name: 'ETD', req: true }, { name: 'ETA', req: true },
            { name: 'Incoterm', req: true }, { name: 'Load type', req: true },
            { name: 'Container type', req: true }, { name: 'Carrier', req: true },
            { name: 'Vessel', req: true }, { name: 'MBL', req: true },
            { name: 'HBL', req: true }, { name: 'Contract number', req: false },
          ]
        },
        {
          label: 'Parties',
          cls: 'cc-teal',
          dotColor: '#0F6E56',
          fields: [
            { name: 'Customer', req: true }, { name: 'Shipper', req: true },
            { name: 'Consignee', req: true }, { name: 'Notify party', req: false },
            { name: 'Agent', req: true },
          ]
        },
        {
          label: 'Cargo',
          cls: 'cc-blue',
          dotColor: '#185FA5',
          fields: [
            { name: 'Package count', req: true }, { name: 'Weight', req: true },
            { name: 'Cargo description', req: true }, { name: 'HS codes', req: true },
            { name: 'Value', req: true }, { name: 'Currency', req: true },
          ]
        },
        {
          label: 'Destination routing',
          cls: 'cc-amber',
          dotColor: '#854F0B',
          fields: [
            { name: 'Pick-up terminal', req: true }, { name: 'Planned pick-up date', req: true },
            { name: 'Transport company', req: true }, { name: 'Delivery address', req: true },
            { name: 'Delivery date', req: true }, { name: 'Return terminal', req: true },
            { name: 'Return planned date', req: true }, { name: 'Extra terminal (barge)', req: false },
          ]
        },
      ];

      const sectionHtml = sections.map(s => `
        <div class="concept-card ${s.cls}" style="min-width:0">
          <div class="cc-title">${s.label}</div>
          <div class="cc-tasks" style="margin-top:6px;padding-top:6px">
            ${s.fields.map(f => `
              <span class="task-pill" style="display:inline-flex;align-items:center;gap:4px;margin-bottom:3px">
                ${f.req
                  ? `<span style="width:5px;height:5px;border-radius:50%;background:${s.dotColor};flex-shrink:0"></span>`
                  : `<span style="width:5px;height:5px;border-radius:50%;border:1.5px solid ${s.dotColor};opacity:.6;flex-shrink:0"></span>`}
                ${f.name}
              </span>`).join('')}
          </div>
        </div>`).join('');

      return `
        <div class="concept-grid" style="grid-template-columns:repeat(auto-fit,minmax(180px,1fr));margin-bottom:12px">
          ${sectionHtml}
        </div>
        <div style="display:flex;gap:16px;font-size:11px;color:var(--text3);margin-bottom:14px;align-items:center">
          <span style="display:inline-flex;align-items:center;gap:5px">
            <span style="width:6px;height:6px;border-radius:50%;background:var(--text2)"></span> Required for all shipments
          </span>
          <span style="display:inline-flex;align-items:center;gap:5px">
            <span style="width:6px;height:6px;border-radius:50%;border:1.5px solid var(--text2)"></span> Conditional — fill where applicable
          </span>
        </div>
        <div class="two-col" style="margin-bottom:14px">
          <div class="concept-card cc-purple">
            <div class="cc-title">API bookings</div>
            <div class="cc-sub" style="color:var(--purple-d)">The agent populates most fields automatically. Ops verifies completeness and fills any gaps — typically via the Check Agent Update task in STG-2.</div>
          </div>
          <div class="concept-card cc-teal">
            <div class="cc-title">Manual bookings</div>
            <div class="cc-sub" style="color:var(--teal-d)">Ops is responsible for filling all required fields. This is the scope of the Complete Shipment Data task in STG-2.</div>
          </div>
        </div>
        <div class="highlight-box" style="margin-bottom:20px"><strong>Looking ahead:</strong> Validation logic will be introduced to check for empty required fields when specific tasks are completed — preventing a shipment from advancing with missing data. For now, completeness is an operational standard enforced through the STG-2 task structure.</div>

        <button onclick="(function(btn){const body=document.getElementById('routing-example');const icon=document.getElementById('routing-chevron');const open=body.style.display!=='none';body.style.display=open?'none':'block';icon.style.transform=open?'rotate(0deg)':'rotate(90deg)'})(this)" style="display:flex;align-items:center;gap:8px;background:none;border:none;cursor:pointer;padding:0;margin-bottom:10px;font-family:inherit">
          <span id="routing-chevron" style="font-size:11px;color:var(--text3);transition:transform .2s;transform:rotate(0deg)">▶</span>

${[

  },

    title: "The Dev Message Log: always present, usually quiet",
    sub: "Every shipment carries a Dev Message Log task. Most of the time it is silent. When the integration layer flags something, its status changes — and it becomes visible in the dashboard.",
    render() {
      return `
        <div class="two-col">
          <div>

            <div class="dash-mock" style="padding:10px 12px">

            <div class="dash-mock" style="padding:10px 12px">

                  <div style="font-size:11px;font-weight:600;color:#d29922">Dev Message Log</div>

          </div>

        <div class="highlight-box"><strong>Status drives visibility:</strong> The task exists on every shipment, but only surfaces in the dashboard when it requires action. Ops can proactively scan for integration issues without searching individual shipments.</div>`;
    }
  },
  {
    label: "Step 5 of 6",
    title: "Error handling: a dedicated triage layer",
    sub: "The Error Handling team is not a phase in the process — it runs in parallel. Any user can open this filter and immediately see every shipment with an active integration problem.",
    render() {
      return `
        <div class="dash-mock" style="margin-bottom:14px">
          <div class="dash-filter">
            <div class="filter-pill error">Error handling</div>

            {t:'Import booking',       c:'cc-purple', d:'Scan daily for new bookings and agent updates'},

let cur = 0;

function renderDots() {
  document.getElementById('dots').innerHTML = steps.map((s, i) =>
    `<button class="dot ${i === cur ? 'active' : i < cur ? 'done' : ''}" onclick="goTo(${i})" aria-label="Step ${i+1}"></button>`
  ).join('');
}

function renderPanel() {
  const s = steps[cur];
  document.getElementById('panel').innerHTML = `
    <div class="panel-head">
      <div class="step-label">Step ${cur + 1} of ${steps.length}</div>
      <div class="panel-title">${s.title}</div>
      <div class="panel-sub">${s.sub}</div>
    </div>
    <div class="panel-body">
      ${s.render()}
      <div class="nav-row">
        <button class="nav-btn" onclick="goTo(${cur - 1})" ${cur === 0 ? 'disabled' : ''}>← Back</button>
        <span class="step-count">${cur + 1} / ${steps.length}</span>
        ${cur < steps.length - 1
          ? `<button class="nav-btn primary" onclick="goTo(${cur + 1})">Next →</button>`
          : `<button class="nav-btn primary" disabled>Complete</button>`}
      </div>
    </div>`;
}

function goTo(i) {
  if (i < 0 || i >= steps.length) return;
  cur = i;
  renderDots();
  renderPanel();
}

renderDots();
renderPanel();
</script>
